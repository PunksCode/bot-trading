# ═══════════════════════════════════════════════════════════
#  PunksCode Quant Bot — Fly.io Configuration
#  Región: São Paulo (GRU) — Sin bloqueo de Binance
# ═══════════════════════════════════════════════════════════

app = 'punkscode-quant-bot'
primary_region = 'gru'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "15s"
  method = "GET"
  path = "/health"

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
